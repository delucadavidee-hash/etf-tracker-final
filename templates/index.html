<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF Tracker - Portafoglio e Analisi ETF</title>
    <meta name="description" content="Dashboard, backtest, correlazioni, community e manuale finanziario. Tutto in un posto.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Critical inline styles - ensures app works even if external CSS fails to load -->
    <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#061528;color:#0A2540;-webkit-font-smoothing:antialiased}
    body{min-height:100vh}
    #app{min-height:100vh}
    .hidden{display:none!important}
    .auth-screen{display:flex;min-height:100vh;background:#061528}
    .auth-left{flex:1;display:flex;flex-direction:column;padding:40px 32px;background:#061528}
    .auth-right{display:none;width:45%;background:#0A2540;color:#fff;padding:64px;flex-direction:column;justify-content:center}
    @media(min-width:1024px){.auth-right{display:flex}}
    .auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:48px}
    .auth-logo-icon{width:40px;height:40px;border-radius:10px;background:var(--green,#0F7B3F);display:flex;align-items:center;justify-content:center}
    .auth-logo-text{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.02em}
    .auth-form-wrapper{display:flex;flex:1;align-items:center;justify-content:center}
    .auth-form{width:100%;max-width:420px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px}
    .auth-mode-toggle{display:flex;background:rgba(255,255,255,0.05);border-radius:8px;padding:4px;margin-bottom:24px}
    .auth-mode-toggle button{flex:1;padding:10px 16px;border-radius:6px;border:none;background:transparent;color:rgba(255,255,255,0.5);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
    .auth-mode-toggle button.active{background:rgba(255,255,255,0.1);color:#fff}
    .auth-title{font-size:28px;font-weight:700;color:#fff!important;margin-bottom:8px;letter-spacing:-0.03em}
    .auth-subtitle{font-size:14px;color:rgba(255,255,255,0.6)!important;margin-bottom:24px}
    .auth-social{margin-bottom:20px}
    .auth-social-btn{width:100%;padding:12px 16px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:rgba(255,255,255,0.03);color:#fff;font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;font-family:inherit}
    .auth-divider{display:flex;align-items:center;gap:16px;margin-bottom:20px;color:rgba(255,255,255,0.4);font-size:13px}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1)}
    .auth-input-group{margin-bottom:16px}
    .auth-input-group label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,0.7);margin-bottom:6px}
    .input-wrapper{position:relative;display:flex;align-items:center}
    .input-wrapper>svg:first-child{position:absolute;left:12px;color:rgba(255,255,255,0.4);z-index:1}
    .form-input{width:100%;padding:12px 16px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:rgba(255,255,255,0.03);color:#fff;font-size:14px;font-family:inherit;outline:none}
    .form-input:focus{border-color:#0F7B3F}
    .form-input::placeholder{color:rgba(255,255,255,0.3)}
    .toggle-pwd{position:absolute;right:12px;cursor:pointer;color:rgba(255,255,255,0.4)}
    .auth-submit{width:100%;padding:14px;border:none;border-radius:8px;background:#0F7B3F;color:#fff;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-family:inherit;margin-top:8px}
    .auth-footer{text-align:center;margin-top:20px;font-size:14px;color:rgba(255,255,255,0.5)}
    .auth-footer a{color:#86EFAC;text-decoration:none;font-weight:600}
    .auth-security{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.05);font-size:12px;color:rgba(255,255,255,0.4)}
    .auth-right-content h2{font-size:32px;font-weight:700;line-height:1.2;margin-bottom:16px;letter-spacing:-0.03em}
    .auth-right-content>p{font-size:15px;line-height:1.6;color:rgba(255,255,255,0.7);margin-bottom:32px}
    .feature-list{display:flex;flex-direction:column;gap:20px}
    .feature-item{display:flex;align-items:center;gap:16px}
    .feature-icon{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .feature-item p{font-size:15px;font-weight:600}
    .feature-item span{font-size:13px;color:rgba(255,255,255,0.5)}
    .onboarding-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#061528;padding:24px}
    .onboarding-card{width:100%;max-width:600px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px}
    .progress-bar{width:100%;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
    .progress-bar-fill{height:100%;background:#0F7B3F;border-radius:3px;transition:width 0.3s}
    .option-btn{display:flex;align-items:center;gap:16px;padding:16px 20px;border:1px solid rgba(255,255,255,0.08);border-radius:12px;background:rgba(255,255,255,0.02);cursor:pointer;transition:border-color 0.2s;width:100%;text-align:left;font-family:inherit}
    .option-btn:hover{border-color:rgba(255,255,255,0.2)}
    .option-icon{width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
    .option-text{flex:1}
    .option-text p{font-size:14px;font-weight:600;color:#fff;margin-bottom:2px}
    .option-text span{font-size:12px;color:rgba(255,255,255,0.4)}
    .option-check{color:rgba(255,255,255,0.3);flex-shrink:0}
    .main-app{display:flex;min-height:100vh}
    .sidebar{width:240px;background:#0A2540;color:rgba(255,255,255,0.5);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:10}
    .sidebar-logo{display:flex;align-items:center;gap:12px;padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.06)}
    .sidebar-logo-icon{width:32px;height:32px;border-radius:8px;background:#0F7B3F;display:flex;align-items:center;justify-content:center}
    .sidebar-logo-text{font-size:16px;font-weight:700;color:#fff}
    .sidebar-nav{flex:1;padding:12px;overflow-y:auto}
    .nav-item{width:100%;padding:10px 12px;border-radius:8px;display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.5);font-size:13px;font-weight:500;background:transparent;border:none;cursor:pointer;font-family:inherit;margin-bottom:2px}
    .nav-item:hover,.nav-item.active{color:#fff;background:rgba(255,255,255,0.06)}
    .main-content{flex:1;margin-left:240px;background:#F7F9FC;min-height:100vh;padding:32px}
    .content-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:16px}
    .section-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
    .section-header-title h1{font-size:22px;font-weight:700;color:#0A2540;letter-spacing:-0.02em;margin-bottom:4px}
    .section-header-title p{font-size:14px;color:#8A94A6}
    .card{background:#fff;border-radius:12px;border:1px solid #E8ECF0;overflow:hidden}
    .card-body{padding:20px}
    .btn{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-family:inherit;border:1px solid transparent;white-space:nowrap}
    .btn-primary{background:#0A2540;color:#fff;border-color:#0A2540}
    .btn-secondary{background:#fff;color:#0A2540;border-color:#E8ECF0}
    .btn-danger{background:#B42318;color:#fff;border-color:#B42318}
    .btn-sm{padding:6px 12px;font-size:12px}
    .btn-block{width:100%;justify-content:center}
    .btn:hover{opacity:0.85}
    .form-select{padding:10px 12px;border:1px solid #E8ECF0;border-radius:8px;background:#fff;color:#0A2540;font-size:13px;font-family:inherit;outline:none}
    .grid-lg-2,.grid-lg-3,.grid-lg-4,.grid-md-2,.grid-md-3{display:grid;gap:20px}
    .grid-lg-2{grid-template-columns:repeat(2,1fr)}.grid-lg-3{grid-template-columns:repeat(3,1fr)}.grid-lg-4{grid-template-columns:repeat(4,1fr)}
    .data-table{width:100%;border-collapse:collapse;font-size:13px}
    .data-table th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:#8A94A6;text-transform:uppercase;letter-spacing:0.03em;border-bottom:1px solid #E8ECF0;white-space:nowrap}
    .data-table td{padding:10px 12px;border-bottom:1px solid #F4F7F9;color:#2D3A4A;vertical-align:middle}
    .data-table tr:hover td{background:#FAFBFC}
    .text-right{text-align:right}
    .stat-label{font-size:12px;color:#8A94A6;margin-bottom:4px;font-weight:600}
    .stat-value{font-size:22px;font-weight:700;color:#0A2540;letter-spacing:-0.02em}
    .stat-sub{font-size:12px;color:#8A94A6;margin-top:4px}
    .label{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}
    .label-success{background:#E6F4EC;color:#0F7B3F}
    .label-warning{background:#FDF3D2;color:#946A00}
    .label-info{background:#E0EDFF;color:#1E5AA0}
    .label-danger{background:#FCE8E8;color:#B42318}
    .label-primary{background:#E8EEF3;color:#1E3A5F}
    .ticker-cell{display:flex;align-items:center;gap:12px}
    .ticker-icon{width:36px;height:36px;background:#0A2540;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;flex-shrink:0}
    .modal-overlay{position:fixed;inset:0;background:rgba(6,21,40,0.6);display:flex;align-items:center;justify-content:center;padding:24px;z-index:1000}
    .modal{background:#fff;border-radius:16px;box-shadow:0 25px 50px rgba(0,0,0,0.25);width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
    .modal-header{padding:20px 24px;border-bottom:1px solid #E8ECF0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
    .modal-body{padding:24px}
    .toast-notification{position:fixed;bottom:24px;right:24px;transform:translateY(100px);opacity:0;transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);z-index:2000;padding:16px 20px;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.15);max-width:400px;font-size:13px}
    .toast-notification.show{transform:translateY(0);opacity:1}
    .toast-success{background:#E6F4EC;color:#0F7B3F;border:1px solid rgba(15,123,63,0.2)}
    .toast-error{background:#FCE8E8;color:#B42318;border:1px solid rgba(180,35,24,0.2)}
    .toggle{width:44px;height:24px;border-radius:12px;background:#D0D5DD;border:none;position:relative;cursor:pointer;padding:0;transition:background 0.2s}
    .toggle.on{background:#0F7B3F}
    .toggle-knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform 0.2s}
    .toggle.on .toggle-knob{transform:translateX(20px)}
    .mini-bar{height:8px;background:#E8ECF0;border-radius:4px;display:flex;overflow:hidden}
    .section-title{font-size:15px;font-weight:600;color:#0A2540;margin-bottom:4px}
    .section-desc{font-size:12px;color:#8A94A6;margin-bottom:16px}
    .list-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;color:#0A2540;border:1px solid transparent;cursor:pointer;background:transparent;font-family:inherit}
    .list-item:hover,.list-item.active{background:#F7F9FC;border-color:#E8ECF0}
    .comment-box{display:flex;gap:12px;padding:16px;background:#F7F9FC;border-radius:12px}
    .comment-avatar{width:36px;height:36px;border-radius:50%;background:#0A2540;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .chart-legend{display:flex;flex-wrap:wrap;gap:20px;margin-top:16px;padding:12px 16px;background:#F7F9FC;border-radius:8px}
    .chart-legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#2D3A4A}
    .chart-legend-line{width:20px;height:2px;border-radius:1px}
    .risk-card{padding:16px;border-radius:12px;border:1px solid #E8ECF0;transition:border-color 0.2s}
    .risk-card:hover{border-color:#D0D5DD}
    .risk-bar{height:6px;border-radius:3px;background:#E8ECF0;margin:8px 0}
    .risk-progress{height:100%;border-radius:3px}
    .tour-overlay{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center}
    .tour-backdrop{position:absolute;inset:0;background:rgba(6,21,40,0.75)}
    .tour-card-wrapper{position:relative;z-index:2;width:100%;max-width:380px;padding:24px}
    .tour-nav-dots{display:flex;justify-content:center;gap:6px;padding:12px}
    .tour-dot{width:6px;height:6px;border-radius:50%;border:none;background:rgba(255,255,255,0.3);cursor:pointer;padding:0}
    .tour-dot.active{background:#fff}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
    .info-cell{background:#F7F9FC;padding:12px;border-radius:8px}
    .info-label{font-size:11px;color:#8A94A6;font-weight:600;margin-bottom:4px;text-transform:uppercase}
    .info-value{font-size:14px;color:#0A2540;font-weight:600}
    @media(max-width:1024px){.grid-lg-2{grid-template-columns:1fr}.grid-lg-3{grid-template-columns:1fr}.grid-lg-4{grid-template-columns:repeat(2,1fr)}.main-content{margin-left:0;padding:16px}.sidebar{display:none}}
    @media(max-width:768px){.grid-lg-4{grid-template-columns:1fr}.content-header{flex-direction:column}}
    @keyframes spin{to{transform:rotate(360deg)}}
    </style>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Auth screen -->
        <div id="auth-screen" class="auth-screen"></div>

        <!-- Onboarding screen -->
        <div id="onboarding-screen" class="hidden"></div>

        <!-- Tour overlay -->
        <div id="tour-overlay" class="hidden"></div>

        <!-- Portfolio created screen -->
        <div id="portfolio-created-screen" class="hidden"></div>

        <!-- Main app -->
        <div id="main-app" class="hidden">
            <!-- Header -->
            <header class="app-header">
                <div class="header-inner">
                    <div class="header-spacer"></div>
                    <div class="logo" onclick="navigateTo('dashboard')">
                        <div class="logo-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                        </div>
                        <span class="logo-text">ETF Tracker</span>
                    </div>
                    <div class="header-actions">
                        <div class="avatar-dropdown">
                            <button class="avatar-btn" id="avatar-btn" onclick="toggleAvatarMenu()">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            </button>
                            <div class="avatar-menu hidden" id="avatar-menu">
                                <div class="avatar-menu-header">
                                    <p class="avatar-name" id="user-name">Marco Rossi</p>
                                    <p class="avatar-email" id="user-email">marco@demo.com</p>
                                </div>
                                <button onclick="navigateTo('settings'); toggleAvatarMenu();">Profilo</button>
                                <button onclick="navigateTo('settings'); toggleAvatarMenu();">Impostazioni</button>
                                <button onclick="startTour(); toggleAvatarMenu();">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                    Avvia tour guidato
                                </button>
                                <button onclick="redoOnboarding(); toggleAvatarMenu();">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
                                    Rivedi onboarding
                                </button>
                                <button class="logout-btn" onclick="logout()">Esci</button>
                            </div>
                        </div>
                    </div>
                </div>
                <nav class="main-nav" id="main-nav"></nav>
            </header>

            <!-- Content -->
            <main class="main-content" id="main-content"></main>

            <!-- Footer -->
            <footer class="app-footer">
                <div class="footer-inner">
                    <div class="footer-left">
                        <span>&copy; 2026 ETF Tracker</span>
                        <span>&middot;</span>
                        <a href="#" onclick="showTerms()">Termini</a>
                        <a href="#" onclick="showPrivacy()">Privacy</a>
                        <a href="#" onclick="showSecurity()">Sicurezza</a>
                    </div>
                    <div class="footer-right">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        <span>Dati protetti con crittografia AES-256</span>
                    </div>
                </div>
            </footer>
        </div>

        <!-- Modal container -->
        <div id="modal-container"></div>

        <!-- Toast container -->
        <div id="toast-container"></div>
    </div>

    <script src="/static/js/data.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
